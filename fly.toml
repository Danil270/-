app = "telegram-bot"
primary_region = "fra"

[build]

[env]
  DB_FILE = "/data/data.json"

[processes]
  app = "python bot.py"

# No [[services]] block — polling bot needs zero inbound ports.
# Without it Fly.io treats this as a pure worker and never idles it.

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "bot_data"
  destination = "/data"
