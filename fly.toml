app = "telegram-bot"
primary_region = "fra"

[build]

[env]
  DB_FILE = "/data/data.json"

[processes]
  app = "python bot.py"

# Без [[services]] — polling-бот не нуждается в входящих портах.
# Fly.io не будет его «усыплять» если нет http_service.

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "bot_data"
  destination = "/data"

# ✅ Запрет авто-остановки машины
[machine]
  auto_stop_seconds = 0

